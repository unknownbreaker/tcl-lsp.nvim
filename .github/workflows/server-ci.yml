name: server-ci
on:
  push:
    paths: ['server/**', '.github/workflows/server-ci.yml']
  pull_request:
    paths: ['server/**', '.github/workflows/server-ci.yml']
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go test ./...
